<app-navbar></app-navbar>

<div
  class="min-h-screen p-8 bg-gray-50 dark:bg-gray-800 transition-colors duration-300"
>
  <button
    (click)="goBack()"
    class="btn btn-link text-gray-700 dark:text-gray-300"
  >
    <i
      class="fas fa-arrow-left dark:text-white text-blue-600 font-semibold font-sans"
      >Home / Task / Add Listening Task</i
    >
  </button>

  <!-- Formulario -->
  <section
    class="max-w-5xl mx-auto bg-white dark:bg-gray-700 rounded-xl shadow-md overflow-hidden transition-colors duration-300"
  >
    <!-- Header del formulario -->
    <div class="bg-indigo-600 p-6">
      <h4 class="text-2xl font-bold text-white">
        Task Specifier Listening Form
      </h4>
    </div>

    <!-- Contenido del formulario -->
    <div class="p-6">
      <!-- Información básica -->
      <section
        class="mb-8 p-6 border border-gray-200 rounded-lg transition-colors duration-300"
      >
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-1">
          <div class="flex flex-col gap-1">
            <label class="text-sm font-medium text-gray-700 dark:text-gray-300"
              >Task ID</label
            >
            <input
              [(ngModel)]="task_id"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-500 dark:text-gray-200 shadow-sm text-sm p-1 placeholder:text-gray-400 dark:placeholder:text-gray-400 focus:border-indigo-500 focus:ring-indigo-500"
              placeholder="Task ID"
            />

            <label class="text-sm font-medium text-gray-700 dark:text-gray-300"
              >Team</label
            >
            <input
              [(ngModel)]="team"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-500 dark:text-gray-200 shadow-sm text-sm p-1 ç dark:placeholder:text-gray-400 focus:border-indigo-500 focus:ring-indigo-500"
              placeholder="Team"
            />
          </div>

          <div class="flex flex-col gap-1">
            <label class="text-sm font-medium text-gray-700 dark:text-gray-300"
              >Name of Item Writer</label
            >
            <input
              [(ngModel)]="name_of_item_writer"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-500 dark:text-gray-200 shadow-sm text-sm p-1 placeholder:text-gray-400 dark:placeholder:text-gray-400 focus:border-indigo-500 focus:ring-indigo-500"
              placeholder="Name of Item Writer"
            />

            <label class="text-sm font-medium text-gray-700 dark:text-gray-300"
              >Date</label
            >
            <input
              [(ngModel)]="date"
              type="date"
              class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-500 dark:text-gray-200 shadow-sm text-sm p-1 placeholder:text-gray-400 dark:placeholder:text-gray-400 focus:border-indigo-500 focus:ring-indigo-500"
            />
          </div>
        </div>
      </section>

      <!-- Text Characteristics -->
      <section
        class="mb-8 p-6 border border-gray-200 rounded-lg transition-colors duration-300"
      >
        <h4 class="text-xl font-semibold text-gray-800 dark:text-gray-100 mb-4">
          Text Characteristics
        </h4>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-4">
          <!-- Izquierda -->
          <div class="flex flex-col gap-1">
            <label class="text-sm font-medium text-gray-700 dark:text-gray-300"
              >Text Source</label
            >
            <input
              [(ngModel)]="text_source"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-500 dark:text-gray-200 shadow-sm text-sm p-1 placeholder:text-gray-400 dark:placeholder:text-gray-400 focus:border-indigo-500 focus:ring-indigo-500"
              placeholder="Text Source"
            />

            <label class="text-sm font-medium text-gray-700 dark:text-gray-300"
              >Authenticity</label
            >
            <input
              [(ngModel)]="authenticity"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-500 dark:text-gray-200 shadow-sm text-sm p-1 placeholder:text-gray-400 dark:placeholder:text-gray-400 focus:border-indigo-500 focus:ring-indigo-500"
              placeholder="Authenticity"
            />

            <label class="text-sm font-medium text-gray-700 dark:text-gray-300"
              >Discourse Type</label
            >
            <input
              [(ngModel)]="discourse_type"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-500 dark:text-gray-200 shadow-sm text-sm p-1 placeholder:text-gray-400 dark:placeholder:text-gray-400 focus:border-indigo-500 focus:ring-indigo-500"
              placeholder="Discourse Type"
            />

            <label class="text-sm font-medium text-gray-700 dark:text-gray-300"
              >Nature of Content</label
            >
            <input
              [(ngModel)]="nature_of_content"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-500 dark:text-gray-200 shadow-sm text-sm p-1 placeholder:text-gray-400 dark:placeholder:text-gray-400 focus:border-indigo-500 focus:ring-indigo-500"
              placeholder="Nature of Content"
            />

            <label class="text-sm font-medium text-gray-700 dark:text-gray-300"
              >Grammar</label
            >
            <input
              [(ngModel)]="grammar"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-500 dark:text-gray-200 shadow-sm text-sm p-1 placeholder:text-gray-400 dark:placeholder:text-gray-400 focus:border-indigo-500 focus:ring-indigo-500"
              placeholder="Grammar"
            />

            <label class="text-sm font-medium text-gray-700 dark:text-gray-300"
              >Number of Participants</label
            >
            <input
              [(ngModel)]="number_of_participants"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-500 dark:text-gray-200 shadow-sm text-sm p-1 placeholder:text-gray-400 dark:placeholder:text-gray-400 focus:border-indigo-500 focus:ring-indigo-500"
              placeholder="Number of Participants"
            />

            <label class="text-sm font-medium text-gray-700 dark:text-gray-300"
              >Speed of Delivery</label
            >
            <input
              [(ngModel)]="speed_of_delivery"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-500 dark:text-gray-200 shadow-sm text-sm p-1 placeholder:text-gray-400 dark:placeholder:text-gray-400 focus:border-indigo-500 focus:ring-indigo-500"
              placeholder="Speed of Delivery"
            />

            <label class="text-sm font-medium text-gray-700 dark:text-gray-300"
              >CEFR Level</label
            >
            <input
              [(ngModel)]="comprehensible_cefr_level"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-500 dark:text-gray-200 shadow-sm text-sm p-1 placeholder:text-gray-400 dark:placeholder:text-gray-400 focus:border-indigo-500 focus:ring-indigo-500"
              placeholder="CEFR Level"
            />
          </div>

          <!-- Derecha -->
          <div class="flex flex-col gap-1">
            <label class="text-sm font-medium text-gray-700 dark:text-gray-300"
              >Where Found?</label
            >
            <input
              [(ngModel)]="where_found"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-500 dark:text-gray-200 shadow-sm text-sm p-1 placeholder:text-gray-400 dark:placeholder:text-gray-400 focus:border-indigo-500 focus:ring-indigo-500"
              placeholder="Where Found?"
            />

            <label class="text-sm font-medium text-gray-700 dark:text-gray-300"
              >Text/Input Type</label
            >
            <input
              [(ngModel)]="text_input_type"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-500 dark:text-gray-200 shadow-sm text-sm p-1 placeholder:text-gray-400 dark:placeholder:text-gray-400 focus:border-indigo-500 focus:ring-indigo-500"
              placeholder="Text/Input Type"
            />

            <label class="text-sm font-medium text-gray-700 dark:text-gray-300"
              >Main Topic Area</label
            >
            <input
              [(ngModel)]="main_topic_area"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-500 dark:text-gray-200 shadow-sm text-sm p-1 placeholder:text-gray-400 dark:placeholder:text-gray-400 focus:border-indigo-500 focus:ring-indigo-500"
              placeholder="Main Topic Area"
            />

            <label class="text-sm font-medium text-gray-700 dark:text-gray-300"
              >Vocabulary</label
            >
            <input
              [(ngModel)]="vocabulary"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-500 dark:text-gray-200 shadow-sm text-sm p-1 placeholder:text-gray-400 dark:placeholder:text-gray-400 focus:border-indigo-500 focus:ring-indigo-500"
              placeholder="Vocabulary"
            />

            <label class="text-sm font-medium text-gray-700 dark:text-gray-300"
              >Length of Input</label
            >
            <input
              [(ngModel)]="length_of_input"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-500 dark:text-gray-200 shadow-sm text-sm p-1 placeholder:text-gray-400 dark:placeholder:text-gray-400 focus:border-indigo-500 focus:ring-indigo-500"
              placeholder="Length of Input"
            />

            <label class="text-sm font-medium text-gray-700 dark:text-gray-300"
              >Accents</label
            >
            <input
              [(ngModel)]="accents"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-500 dark:text-gray-200 shadow-sm text-sm p-1 placeholder:text-gray-400 dark:placeholder:text-gray-400 focus:border-indigo-500 focus:ring-indigo-500"
              placeholder="Accents"
            />

            <label class="text-sm font-medium text-gray-700 dark:text-gray-300"
              >Clarity of Articulation</label
            >
            <input
              [(ngModel)]="clarity_of_articulation"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-500 dark:text-gray-200 shadow-sm text-sm p-1 placeholder:text-gray-400 dark:placeholder:text-gray-400 focus:border-indigo-500 focus:ring-indigo-500"
              placeholder="Clarity of Articulation"
            />
          </div>
        </div>
      </section>

      <!-- Item Characteristics -->
      <section
        class="mb-8 p-6 border border-gray-200 rounded-lg transition-colors duration-300"
      >
        <h4 class="text-xl font-semibold text-gray-800 dark:text-gray-100 mb-2">
          Item Characteristics
        </h4>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-2">
          <div class="flex flex-col gap-1">
            <label class="text-sm font-medium text-gray-700 dark:text-gray-300"
              >Targeted Listening (Main)</label
            >
            <input
              [(ngModel)]="test_task"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-500 dark:text-gray-200 shadow-sm text-sm p-1 placeholder:text-gray-400 dark:placeholder:text-gray-400 focus:border-indigo-500 focus:ring-indigo-500"
              placeholder="Targeted Listening..."
            />

            <label class="text-sm font-medium text-gray-700 dark:text-gray-300"
              >Items Type</label
            >
            <input
              [(ngModel)]="item_characteristics"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-500 dark:text-gray-200 shadow-sm text-sm p-1 placeholder:text-gray-400 dark:placeholder:text-gray-400 focus:border-indigo-500 focus:ring-indigo-500"
              placeholder="Items Type"
            />
          </div>

          <div class="flex flex-col gap-1">
            <label class="text-sm font-medium text-gray-700 dark:text-gray-300"
              >Estimated Level</label
            >
            <input
              [(ngModel)]="task_level_estimated"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-500 dark:text-gray-200 shadow-sm text-sm p-1 placeholder:text-gray-400 dark:placeholder:text-gray-400 focus:border-indigo-500 focus:ring-indigo-500"
              placeholder="Estimated Level"
            />
          </div>
        </div>
      </section>

      <!-- Task Characteristics -->
      <section
        class="mb-8 p-6 border border-gray-200 rounded-lg transition-colors duration-300"
      >
        <h4 class="text-xl font-semibold text-gray-800 dark:text-gray-100 mb-2">
          Task Characteristics
        </h4>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-2">
          <div>
            <label class="text-sm font-medium text-gray-700 dark:text-gray-300"
              >Time to Complete Task (Minutes)</label
            >
            <input
              [(ngModel)]="time_to_do_total_task_minutes"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-500 dark:text-gray-200 shadow-sm text-sm p-1 placeholder:text-gray-400 dark:placeholder:text-gray-400 focus:border-indigo-500 focus:ring-indigo-500"
              placeholder="Minutes"
            />
          </div>
        </div>
      </section>

      <!-- Comments and Feedback -->
      <section
        class="mb-8 p-6 border border-gray-200 rounded-lg transition-colors duration-300"
      >
        <h4 class="text-xl font-semibold text-gray-800 dark:text-gray-100 mb-2">
          Comments and Feedback
        </h4>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-2">
          <div class="flex flex-col gap-1">
            <label class="text-sm font-medium text-gray-700 dark:text-gray-300"
              >Comments</label
            >
            <input
              [(ngModel)]="comments"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-500 dark:text-gray-200 shadow-sm text-sm p-1 placeholder:text-gray-400 dark:placeholder:text-gray-400 focus:border-indigo-500 focus:ring-indigo-500"
              placeholder="Comments"
            />

            <label class="text-sm font-medium text-gray-700 dark:text-gray-300"
              >Feedback Date</label
            >
            <input
              [(ngModel)]="feedback_date"
              type="date"
              class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-500 dark:text-gray-200 shadow-sm text-sm p-1 placeholder:text-gray-400 dark:placeholder:text-gray-400 focus:border-indigo-500 focus:ring-indigo-500"
            />
          </div>

          <div class="flex flex-col gap-1">
            <label class="text-sm font-medium text-gray-700 dark:text-gray-300"
              >Feedback Provided By</label
            >
            <input
              [(ngModel)]="feedback_provided_by"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-500 dark:text-gray-200 shadow-sm text-sm p-1 placeholder:text-gray-400 dark:placeholder:text-gray-400 focus:border-indigo-500 focus:ring-indigo-500"
              placeholder="Provided By"
            />

            <label class="text-sm font-medium text-gray-700 dark:text-gray-300"
              >Feedback</label
            >
            <input
              [(ngModel)]="feedback_text"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-500 dark:text-gray-200 shadow-sm text-sm p-1 placeholder:text-gray-400 dark:placeholder:text-gray-400 focus:border-indigo-500 focus:ring-indigo-500"
              placeholder="Feedback"
            />
          </div>
        </div>
      </section>

      <!-- Botones -->
      <div class="flex justify-end gap-4">
        <button
          type="button"
          (click)="goBack()"
          class="px-6 py-2 border border-gray-300 dark:border-gray-500 rounded-md shadow-sm text-sm font-medium text-gray-700 dark:text-gray-200 bg-white dark:bg-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        >
          Cancel
        </button>

        <button
          type="button"
          (click)="addListeningTask()"
          class="px-6 py-2 rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        >
          Submit
        </button>
      </div>
    </div>
  </section>
</div>
