<app-navbar></app-navbar>
<div class="min-h-screen p-8 bg-gray-50">
  <button (click)="goBack()" class="btn btn-link">
    <i class="fas fa-arrow-left"></i> Volver atrás
  </button>

  <!-- Formulario -->
  <section
    class="max-w-5xl mx-auto bg-white rounded-xl shadow-md overflow-hidden"
  >
    <!-- Header del formulario -->
    <div class="bg-indigo-600 p-6">
      <h4 class="text-2xl font-bold text-white">
        Task Specifier Speaking Form
      </h4>
    </div>

    <!-- Contenido del formulario -->
    <div class="p-6">
      <!-- Información básica -->
      <section class="mb-8 p-6 bg-indigo-50 rounded-lg">
        <h4 class="text-xl font-semibold text-gray-800 mb-4">
          Basic Information
        </h4>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-1">
          <div class="flex flex-col gap-1">
            <label class="text-sm font-medium text-gray-700">Task ID</label>
            <input
              [(ngModel)]="task_id"
              name="task_id"
              id="task_id"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-1 placeholder:text-gray-400"
              placeholder="Task ID"
            />

            <label class="text-sm font-medium text-gray-700">Team</label>
            <input
              [(ngModel)]="team"
              name="team"
              id="team"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-1 placeholder:text-gray-400"
              placeholder="Team"
            />
          </div>

          <div class="flex flex-col gap-1">
            <label class="text-sm font-medium text-gray-700"
              >Name of Item Writer</label
            >
            <input
              [(ngModel)]="name_of_item_writer"
              name="name_of_item_writer"
              id="name_of_item_writer"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-1 placeholder:text-gray-400"
              placeholder="Name of Item Writer"
            />
            <label class="text-sm font-medium text-gray-700">Date</label>
            <input
              [(ngModel)]="date"
              name="date"
              id="date"
              type="date"
              class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-1 placeholder:text-gray-400"
              placeholder="Date"
            />
          </div>
        </div>
      </section>

      <!-- Task Details -->
      <section class="mb-8 p-6 bg-indigo-50 rounded-lg">
        <h4 class="text-xl font-semibold text-gray-800 mb-4">Task Details</h4>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-4">
          <div class="flex flex-col gap-1">
            <label class="text-sm font-medium text-gray-700"
              >Targeted Outcomes</label
            >
            <input
              [(ngModel)]="targetted_outcomes"
              name="targetted_outcomes"
              id="targetted_outcomes"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-2 placeholder:text-gray-400"
              placeholder="Targeted Outcomes"
            />

            <label class="text-sm font-medium text-gray-700"
              >Main Topic Area</label
            >
            <input
              [(ngModel)]="main_topic_area"
              name="main_topic_area"
              id="main_topic_area"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-2 placeholder:text-gray-400"
              placeholder="Main Topic Area"
            />

            <label class="text-sm font-medium text-gray-700"
              >Nature of Content</label
            >
            <input
              [(ngModel)]="nature_of_content"
              name="nature_of_content"
              id="nature_of_content"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-2 placeholder:text-gray-400"
              placeholder="Nature of Content"
            />

            <label class="text-sm font-medium text-gray-700"
              >Expected Vocabulary</label
            >
            <input
              [(ngModel)]="expected_vocabulary"
              name="expected_vocabulary"
              id="expected_vocabulary"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-2 placeholder:text-gray-400"
              placeholder="Expected Vocabulary"
            />
            <label class="text-sm font-medium text-gray-700">Test Task</label>
            <input
              [(ngModel)]="test_task"
              name="test_task"
              id="test_task"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-2 placeholder:text-gray-400"
              placeholder="Test Task"
            />
          </div>

          <div class="flex flex-col gap-1">
            <label class="text-sm font-medium text-gray-700">Prompt Type</label>
            <input
              [(ngModel)]="prompt_type"
              name="prompt_type"
              id="prompt_type"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-2 placeholder:text-gray-400"
              placeholder="Prompt Type"
            />

            <label class="text-sm font-medium text-gray-700"
              >Time to Complete (minutes)</label
            >
            <input
              [(ngModel)]="time_to_do_total_task_minutes"
              name="time_to_do_total_task_minutes"
              id="time_to_do_total_task_minutes"
              type="number"
              class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-2 placeholder:text-gray-400"
              placeholder="Time in minutes"
            />

            <label class="text-sm font-medium text-gray-700"
              >Task Level Estimated</label
            >
            <input
              [(ngModel)]="task_level_estimated"
              name="task_level_estimated"
              id="task_level_estimated"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-2 placeholder:text-gray-400"
              placeholder="Task Level Estimated"
            />

            <label class="text-sm font-medium text-gray-700"
              >Task Section Task</label
            >
            <input
              [(ngModel)]="task_section_task"
              name="task_section_task"
              id="task_section_task"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-2 placeholder:text-gray-400"
              placeholder="Task Section Task"
            />

            <label class="text-sm font-medium text-gray-700"
              >Expected Outcomes</label
            >
            <input
              [(ngModel)]="expected_outcomes"
              name="expected_outcomes"
              id="expected_outcomes"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-2 placeholder:text-gray-400"
              placeholder="Expected Outcomes"
            />
          </div>
        </div>
      </section>

      <!-- Comments and Feedback -->
      <section class="flex flex-col mb-8 p-6 bg-indigo-50 rounded-lg">
        <h4 class="text-xl font-semibold text-gray-800 mb-4">
          Comments and Feedback
        </h4>

        <div class="grid grid-cols-1 gap-8">
          <div class="flex flex-col gap-1">
            <label class="text-sm font-medium text-gray-700">Comments</label>
            <textarea
              [(ngModel)]="comments"
              name="comments"
              id="comments"
              rows="3"
              class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-2 placeholder:text-gray-400"
              placeholder="Enter your comments here..."
            ></textarea>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="flex flex-col gap-1">
              <label class="text-sm font-medium text-gray-700"
                >Feedback Provided By</label
              >
              <input
                [(ngModel)]="feedback_provided_by"
                name="feedback_provided_by"
                id="feedback_provided_by"
                type="text"
                class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-2 placeholder:text-gray-400"
                placeholder="Feedback Provided By"
              />

              <label class="text-sm font-medium text-gray-700"
                >Feedback Date</label
              >
              <input
                [(ngModel)]="feedback_date"
                name="feedback_date"
                id="feedback_date"
                type="date"
                class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-2 placeholder:text-gray-400"
                placeholder="Feedback Date"
              />
            </div>

            <div class="flex flex-col gap-1">
              <label class="text-sm font-medium text-gray-700"
                >Feedback Team</label
              >
              <input
                [(ngModel)]="feedback_team"
                name="feedback_team"
                id="feedback_team"
                type="text"
                class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-2 placeholder:text-gray-400"
                placeholder="Feedback Team"
              />
            </div>
          </div>

          <div class="flex flex-col gap-1">
            <label class="text-sm font-medium text-gray-700"
              >Feedback Text</label
            >
            <textarea
              [(ngModel)]="feedback_text"
              name="feedback_text"
              id="feedback_text"
              rows="4"
              class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-2 placeholder:text-gray-400"
              placeholder="Enter feedback text here..."
            ></textarea>
          </div>
        </div>
      </section>

      <!-- Botón de envío -->
      <div class="flex justify-end gap-4">
        <button
          type="button"
          (click)="goBack()"
          class="px-6 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500"
        >
          Cancel
        </button>
        <button
          type="button"
          (click)="addSpeakingTask()"
          class="px-6 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500"
        >
          Submit
        </button>
      </div>
    </div>
  </section>
</div>
