<app-navbar></app-navbar>
<div class="min-h-screen p-8 bg-gray-50">
  <button (click)="goBack()" class="btn btn-link">
    <i class="fas fa-arrow-left"></i> Volver atrás
  </button>

  <!-- Formulario -->
  <section
    class="max-w-5xl mx-auto bg-white rounded-xl shadow-md overflow-hidden"
  >
    <!-- Header del formulario -->
    <div class="bg-indigo-600 p-6">
      <h4 class="text-2xl font-bold text-white">Task Specifier Reading Form</h4>
    </div>

    <!-- Contenido del formulario -->
    <div class="p-6">
      <!-- Información básica -->
      <section class="mb-8 p-6 bg-indigo-50 rounded-lg">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-1">
          <div class="flex flex-col gap-1">
            <label class="text-sm font-medium text-gray-700">Task ID</label>
            <input
              [(ngModel)]="task_id"
              name="task_id"
              id="task_id"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-1 placeholder:text-gray-400"
              placeholder="Task ID"
            />

            <label class="text-sm font-medium text-gray-700">Team</label>
            <input
              [(ngModel)]="team"
              name="team"
              id="team"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-1 placeholder:text-gray-400"
              placeholder="Team"
            />
          </div>

          <div class="flex flex-col gap-1">
            <label class="text-sm font-medium text-gray-700"
              >Name of item Writer</label
            >
            <input
              [(ngModel)]="name_of_item_writer"
              name="name_of_item_writer"
              id="name_of_item_writer"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-1 placeholder:text-gray-400"
              placeholder="Name of item Writer"
            />
            <label class="text-sm font-medium text-gray-700">Date</label>
            <input
              [(ngModel)]="date"
              name="date"
              id="date"
              type="date"
              class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-1 placeholder:text-gray-400"
              placeholder="Date"
            />
          </div>
        </div>
      </section>

      <!-- Text Characteristics -->
      <section class="mb-8 p-6 bg-indigo-50 rounded-lg">
        <h4 class="text-xl font-semibold text-gray-800 mb-4">
          Text Characteristics
        </h4>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-4">
          <!-- Columna izquierda -->
          <div class="flex flex-col gap-1">
            <label class="text-sm font-medium text-gray-700">Text Source</label>
            <input
              [(ngModel)]="text_source"
              name="text_source"
              id="text_source"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-2 placeholder:text-gray-400"
              placeholder="Text Source"
            />

            <label class="text-sm font-medium text-gray-700">Where Found</label>
            <input
              [(ngModel)]="where_found"
              name="where_found"
              id="where_found"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-2 placeholder:text-gray-400"
              placeholder="Where was the text found?"
            />

            <label class="text-sm font-medium text-gray-700">Text Type</label>
            <input
              [(ngModel)]="text_type"
              name="text_type"
              id="text_type"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-2 placeholder:text-gray-400"
              placeholder="Text Type"
            />
          </div>

          <!-- Columna derecha -->
          <div class="flex flex-col gap-1">
            <label class="text-sm font-medium text-gray-700"
              >Authenticity</label
            >
            <input
              [(ngModel)]="authenticity"
              name="authenticity"
              id="authenticity"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-2 placeholder:text-gray-400"
              placeholder="Authenticity"
            />

            <label class="text-sm font-medium text-gray-700">Form</label>
            <input
              [(ngModel)]="form"
              name="form"
              id="form"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-2 placeholder:text-gray-400"
              placeholder="Form"
            />

            <label class="text-sm font-medium text-gray-700"
              >Discourse Type</label
            >
            <input
              [(ngModel)]="discourse_type"
              name="discourse_type"
              id="discourse_type"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-2 placeholder:text-gray-400"
              placeholder="Discourse Type"
            />
          </div>
        </div>

        <!-- Área de texto para el contenido -->
        <div class="mt-4">
          <label class="text-sm font-medium text-gray-700"
            >Main Topic Area</label
          >
          <textarea
            [(ngModel)]="main_topic_area"
            name="main_topic_area"
            id="main_topic_area"
            rows="3"
            class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-2 placeholder:text-gray-400"
            placeholder="Main topic area..."
          ></textarea>
        </div>

        <div class="mt-4">
          <label class="text-sm font-medium text-gray-700"
            >Nature of Content</label
          >
          <textarea
            [(ngModel)]="nature_of_content"
            name="nature_of_content"
            id="nature_of_content"
            rows="3"
            class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-2 placeholder:text-gray-400"
            placeholder="Nature of content..."
          ></textarea>
        </div>

        <div class="mt-4">
          <label class="text-sm font-medium text-gray-700">Vocabulary</label>
          <textarea
            [(ngModel)]="vocabulary"
            name="vocabulary"
            id="vocabulary"
            rows="3"
            class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-2 placeholder:text-gray-400"
            placeholder="Vocabulary details..."
          ></textarea>
        </div>
      </section>

      <!-- Comments and Feedback -->
      <section class="flex flex-col mb-8 p-6 bg-indigo-50 rounded-lg">
        <h4 class="text-xl font-semibold text-gray-800 mb-2">
          Comments and Feedback
        </h4>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-2">
          <div class="flex flex-col gap-1">
            <label for="" class="text-sm font-medium text-gray-700"
              >Comments</label
            >
            <input
              [(ngModel)]="comments"
              name="comments"
              id="comments"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-2 placeholder:text-gray-400"
              placeholder="Comments"
            />

            <label for="" class="text-sm font-medium text-gray-700"
              >Feedback Date
            </label>
            <input
              [(ngModel)]="feedback_date"
              name="feedback_date"
              id="feedback_date"
              type="date"
              class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-2 placeholder:text-gray-400"
              placeholder="Feedback Date"
            />
          </div>

          <div class="flex flex-col gap-1">
            <label for="" class="text-sm font-medium text-gray-700"
              >Feedback Provided By</label
            >
            <input
              [(ngModel)]="feedback_provided_by"
              name="feedback_provided_by"
              id="feedback_provided_by"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-2 placeholder:text-gray-400"
              placeholder="Feedback Provided By"
            />

            <label for="" class="text-sm font-medium text-gray-700"
              >Feedback</label
            >
            <input
              [(ngModel)]="feedback_text"
              name="feedback_text"
              id="feedback_text"
              type="text"
              class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-2 placeholder:text-gray-400"
              placeholder="Feedback"
            />
          </div>
        </div>
      </section>

      <!-- Botón de envío -->
      <div class="flex justify-end gap-4">
        <button
          type="button"
          (click)="goBack()"
          class="px-6 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500"
        >
          Cancel
        </button>
        <button
          type="button"
          (click)="addReadingTask()"
          class="px-6 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500"
        >
          Submit
        </button>
      </div>
    </div>
  </section>
</div>
