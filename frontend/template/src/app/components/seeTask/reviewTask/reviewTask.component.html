<div
  class="min-h-screen p-8 bg-gray-50 dark:bg-gray-800 transition-colors duration-300"
>
  <section
    class="max-w-5xl mx-auto bg-white dark:bg-gray-700 rounded-xl shadow-md overflow-hidden transition-colors duration-300"
  >
    <!-- Header del formulario -->
    <div class="bg-indigo-600 p-6 flex items-center justify-between">
      <div>
        <h4 class="text-2xl font-bold text-white">Revisar tarea</h4>
        <p class="text-sm text-indigo-100 mt-1">
          {{ taskDetails?.task_id }} — {{ taskDetails?.task_type | uppercase }}
        </p>
      </div>
      <div class="flex items-center gap-3">
        <button
          (click)="goBack()"
          class="px-4 py-2 rounded-md border border-indigo-100 text-indigo-100 hover:bg-indigo-500/20"
        >
          Volver
        </button>
      </div>
    </div>

    <div class="p-6">
      @if (loading()) {
        <p class="text-sm text-gray-500 dark:text-gray-300">Cargando...</p>
      } @else {
        <!-- Información básica -->
        <section
          class="mb-6 p-6 border border-gray-200 rounded-lg transition-colors duration-300"
        >
          <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-1">
            <div class="flex flex-col gap-1">
              <label
                class="text-sm font-medium text-gray-700 dark:text-gray-300"
                >Equipo</label
              >
              <input
                [value]="taskDetails?.team"
                readonly
                class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-500 dark:text-gray-200 shadow-sm text-sm p-2 bg-gray-100 dark:bg-gray-800"
              />

              <label
                class="text-sm font-medium text-gray-700 dark:text-gray-300 mt-3"
                >Autor</label
              >
              <input
                [value]="taskDetails?.name_of_item_writer"
                readonly
                class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-500 dark:text-gray-200 shadow-sm text-sm p-2 bg-gray-100 dark:bg-gray-800"
              />
            </div>

            <div class="flex flex-col gap-1">
              <label
                class="text-sm font-medium text-gray-700 dark:text-gray-300"
                >Fecha</label
              >
              <input
                [value]="taskDetails?.date | date: 'yyyy-MM-dd'"
                readonly
                class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-500 dark:text-gray-200 shadow-sm text-sm p-2 bg-gray-100 dark:bg-gray-800"
              />

              <label
                class="text-sm font-medium text-gray-700 dark:text-gray-300 mt-3"
                >Estado</label
              >
              <input
                [(ngModel)]="taskDetails.status"
                name="status"
                class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-500 dark:text-gray-200 shadow-sm text-sm p-2 bg-white dark:bg-gray-800"
              />
            </div>
          </div>
        </section>

        <!-- Detalles de la tarea -->
        <section
          class="mb-6 p-6 border border-gray-200 rounded-lg transition-colors duration-300"
        >
          <h4
            class="text-xl font-semibold text-gray-800 dark:text-gray-100 mb-2"
          >
            Detalles de la tarea
          </h4>
          <div
            class="overflow-hidden rounded-lg border border-gray-100 dark:border-gray-600"
          >
            <table class="w-full text-sm">
              <tbody class="divide-y divide-gray-100 dark:divide-gray-600">
                @for (item of displayEntries(); track item.key) {
                  <tr class="hover:bg-gray-50 dark:hover:bg-gray-700">
                    <td
                      class="px-4 py-3 w-1/3 text-gray-600 dark:text-gray-200"
                    >
                      {{ item.label }}
                    </td>
                    <td
                      class="px-4 py-3 text-gray-800 dark:text-gray-100 whitespace-pre-wrap"
                    >
                      {{ item.value }}
                    </td>
                  </tr>
                }
              </tbody>
            </table>
          </div>
        </section>

        <!-- Feedback -->
        <section
          class="mb-6 p-6 border border-gray-200 rounded-lg transition-colors duration-300"
        >
          <h4
            class="text-xl font-semibold text-gray-800 dark:text-gray-100 mb-2"
          >
            Feedback
          </h4>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-4">
            <div class="flex flex-col gap-1">
              <label
                class="text-sm font-medium text-gray-700 dark:text-gray-300"
                >Equipo/rol</label
              >
              <input
                [(ngModel)]="feedback_team"
                name="feedback_team"
                type="text"
                class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-2 dark:placeholder:text-gray-400 placeholder:text-gray-400"
                placeholder="Equipo/rol"
              />
            </div>

            <div class="flex flex-col gap-1">
              <label
                class="text-sm font-medium text-gray-700 dark:text-gray-300"
                >Proveedor de feedback</label
              >
              <input
                [(ngModel)]="feedback_provided_by"
                name="feedback_provided_by"
                type="text"
                class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-2 dark:placeholder:text-gray-400 placeholder:text-gray-400"
                placeholder="Proveedor"
              />
            </div>

            <div class="md:col-span-2">
              <label
                class="text-sm font-medium text-gray-700 dark:text-gray-300"
                >Feedback</label
              >
              <textarea
                [(ngModel)]="feedback_text"
                name="feedback_text"
                rows="4"
                class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-2 dark:placeholder:text-gray-400 placeholder:text-gray-400"
                placeholder="Escribe el feedback..."
              ></textarea>
            </div>

            <div>
              <label
                class="text-sm font-medium text-gray-700 dark:text-gray-300"
                >Fecha de feedback</label
              >
              <input
                type="date"
                [(ngModel)]="feedback_date"
                name="feedback_date"
                class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm text-sm p-2"
              />
            </div>
          </div>
        </section>

        <!-- Acciones -->
        <div class="flex justify-end gap-4">
          <button
            type="button"
            (click)="goBack()"
            class="px-6 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 dark:text-gray-300 bg-white hover:bg-gray-50"
          >
            Cancelar
          </button>
          <button
            type="button"
            (click)="saveFeedback()"
            class="px-6 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700"
          >
            Guardar feedback
          </button>
        </div>
      }
    </div>
  </section>
</div>
