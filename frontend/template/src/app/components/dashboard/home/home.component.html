<div
  class="p-6 bg-gray-50 dark:bg-gray-900 min-h-screen transition-colors duration-300 rounded-lg"
>
  <h1 class="text-2xl font-bold mb-6 text-gray-800 dark:text-gray-100">
    Control panel
  </h1>

  <!-- Tarjetas de estadísticas -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
    <!-- Tarjeta Estudiantes -->
    <div
      class="bg-white dark:bg-gray-800 rounded-lg shadow dark:shadow-gray-700 p-6 transition-colors duration-300"
    >
      <div class="flex items-center">
        <div
          class="p-3 rounded-full bg-blue-100 dark:bg-blue-900 text-blue-600 dark:text-blue-300 mr-4"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-8 w-8"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"
            />
          </svg>
        </div>
        <div>
          <p class="text-gray-500 dark:text-gray-400 text-sm">Administrator</p>
          <p class="text-2xl font-bold text-gray-900 dark:text-gray-100">
            {{ totalAdmin }}
          </p>
        </div>
      </div>
    </div>

    <!-- Tarjeta Profesores -->
    <div
      class="bg-white dark:bg-gray-800 rounded-lg shadow dark:shadow-gray-700 p-6 transition-colors duration-300"
    >
      <div class="flex items-center">
        <div
          class="p-3 rounded-full bg-green-100 dark:bg-green-900 text-green-600 dark:text-green-300 mr-4"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-8 w-8"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"
            />
          </svg>
        </div>
        <div>
          <p class="text-gray-500 dark:text-gray-400 text-sm">Teachers</p>
          <p class="text-2xl font-bold text-gray-900 dark:text-gray-100">
            {{ totalProfesores }}
          </p>
        </div>
      </div>
    </div>

    <!-- Tarjeta Cursos Activos -->
    <div
      class="bg-white dark:bg-gray-800 rounded-lg shadow dark:shadow-gray-700 p-6 transition-colors duration-300"
    >
      <div class="flex items-center">
        <div
          class="p-3 rounded-full bg-yellow-100 dark:bg-yellow-900 text-yellow-600 dark:text-yellow-300 mr-4"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-8 w-8"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"
            />
          </svg>
        </div>
        <div>
          <p class="text-gray-500 dark:text-gray-400 text-sm">
            Quality Assurance
          </p>
          <p class="text-2xl font-bold text-gray-900 dark:text-gray-100">
            {{ totalCalidad }}
          </p>
        </div>
      </div>
    </div>

    <!-- Tarjeta Próximas Clases -->
    <div
      class="bg-white dark:bg-gray-800 rounded-lg shadow dark:shadow-gray-700 p-6 transition-colors duration-300"
    >
      <div class="flex items-center">
        <div
          class="p-3 rounded-full bg-purple-100 dark:bg-purple-900 text-purple-600 dark:text-purple-300 mr-4"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-8 w-8"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"
            />
          </svg>
        </div>
        <div>
          <p class="text-gray-500 dark:text-gray-400 text-sm">Project leader</p>
          <p class="text-2xl font-bold text-gray-900 dark:text-gray-100">
            {{ totalLider }}
          </p>
        </div>
      </div>
    </div>
  </div>

  <!-- Gráficos -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <!-- Gráfico de barras -->
    <div
      class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow dark:shadow-gray-700 transition-colors duration-300"
    >
      <h2 class="text-lg font-semibold mb-4 text-gray-800 dark:text-gray-100">
        Monthly Registrations
      </h2>
      <div style="height: 300px">
        <canvas #barChart></canvas>
      </div>
    </div>

    <!-- Gráfico de torta -->
    <div
      class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow dark:shadow-gray-700 transition-colors duration-300"
    >
      <h2 class="text-lg font-semibold mb-4 text-gray-800 dark:text-gray-100">
        User Distribution
      </h2>
      <div style="height: 300px">
        <canvas #pieChart class="flex-row"></canvas>
      </div>
    </div>
  </div>
</div>
