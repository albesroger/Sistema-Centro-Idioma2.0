<!-- Overlay oscuro cuando el sidebar está abierto en pantallas pequeñas -->
<div
  class="fixed inset-0 bg-black/40 backdrop-blur-sm z-10 lg:hidden transition-opacity duration-300 ease-in-out"
  *ngIf="isVisible"
  (click)="closeSidebar()"
></div>

<!-- Sidebar principal -->
<div
  class="fixed top-13 left-0 h-[calc(100vh-48px)] w-64 bg-gradient-to-b from-gray-100 to-gray-200 text-gray-900 dark:from-slate-900 dark:to-slate-800 dark:text-white shadow-lg transform transition-transform duration-300 ease-in-out z-20 lg:translate-x-0"
  [class.-translate-x-full]="!isVisible"
>
  <!-- Navigation -->
  <nav class="mt-6">
    <div class="px-4 mb-6">
      <p
        class="text-md font-semibold text-indigo-600 uppercase tracking-wider dark:text-indigo-300"
      >
        DASHBOARD
      </p>
    </div>

    <ul class="space-y-1 px-2">
      <li
        *ngFor="let item of menuItems"
        (click)="navigate(item.route); closeSidebar()"
        class="group flex items-center px-4 py-3 text-sm font-medium rounded-lg transition-all duration-200 cursor-pointer"
        [ngClass]="{
          'bg-indigo-600 text-white shadow-md dark:bg-indigo-700': isActive(
            item.route
          ),
          'text-gray-700 hover:bg-indigo-100 dark:text-indigo-100 dark:hover:bg-indigo-700/50':
            !isActive(item.route)
        }"
      >
        <!-- Iconos -->
        <ng-container [ngSwitch]="item.icon">
          <svg
            *ngSwitchCase="'home'"
            class="w-5 h-5 mr-3"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"
            />
          </svg>

          <svg
            *ngSwitchCase="'people'"
            class="w-5 h-5 mr-3"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M17 20h5v-2a4 4 0 00-3-3.87M9 20H4v-2a4 4 0 013-3.87M12 12a4 4 0 100-8 4 4 0 000 8z"
            />
          </svg>

          <svg
            *ngSwitchCase="'school'"
            class="w-5 h-5 mr-3"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 14l9-5-9-5-9 5 9 5zm0 0v7m0 0l-9-5m9 5l9-5"
            />
          </svg>

          <svg
            *ngSwitchCase="'settings'"
            class="w-5 h-5 mr-3"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
            />
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
            />
          </svg>
        </ng-container>

        <span class="flex-1">{{ item.label }}</span>

        <span
          *ngIf="item.badge"
          class="px-2 py-0.5 text-xs font-medium bg-indigo-500 text-white rounded-full"
          >{{ item.badge }}</span
        >
      </li>
    </ul>
  </nav>
</div>
